<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fight Times – UFC & Boxing Schedules</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,900;1,700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #080808;
  --surface: #111;
  --surface2: #1a1a1a;
  --red: #e8003d;
  --red-glow: rgba(232,0,61,0.35);
  --gold: #f5c842;
  --text: #f0f0f0;
  --muted: #888;
  --border: rgba(255,255,255,0.07);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Barlow', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── NOISE GRAIN ─────────────────────────────────────────────────────────── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
  opacity: 0.4;
}

/* ─── HEADER ──────────────────────────────────────────────────────────────── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.5rem 3rem;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: rgba(8,8,8,0.92);
  backdrop-filter: blur(12px);
  z-index: 100;
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2rem;
  letter-spacing: 0.08em;
  color: var(--text);
}

.logo span { color: var(--red); }

nav { display: flex; gap: 2.5rem; }

nav a {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 600;
  font-size: 0.95rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  text-decoration: none;
  transition: color 0.2s;
}

nav a:hover { color: var(--text); }

/* ─── HERO ────────────────────────────────────────────────────────────────── */
.hero {
  position: relative;
  min-height: 92vh;
  display: grid;
  grid-template-columns: 1fr 1fr;
  overflow: hidden;
}

.hero-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 80% at 20% 50%, rgba(232,0,61,0.12), transparent),
    radial-gradient(ellipse 50% 70% at 80% 50%, rgba(232,0,61,0.06), transparent);
}

/* Diagonal split line */
.hero::after {
  content: '';
  position: absolute;
  top: 0; bottom: 0;
  left: 50%;
  width: 2px;
  background: linear-gradient(to bottom, transparent, var(--red), transparent);
  transform: skewX(-3deg);
  z-index: 2;
}

.hero-left {
  position: relative;
  z-index: 3;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 5rem 4rem 5rem 5rem;
}

.hero-right {
  position: relative;
  z-index: 3;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: flex-end;
  padding: 5rem 5rem 5rem 4rem;
  text-align: right;
}

.fight-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 0.8rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--red);
  margin-bottom: 1.5rem;
  display: flex;
  align-items: center;
  gap: 0.6rem;
}

.fight-label .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--red);
  animation: pulse-dot 1.4s ease-in-out infinite;
}

@keyframes pulse-dot {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.6); opacity: 0.5; }
}

.hero-right .fight-label {
  justify-content: flex-end;
}

.fighter-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(4rem, 9vw, 8rem);
  line-height: 0.9;
  letter-spacing: 0.02em;
  color: var(--text);
  text-shadow: 0 0 80px rgba(232,0,61,0.2);
}

.fighter-record {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  color: var(--muted);
  margin-top: 0.8rem;
  text-transform: uppercase;
}

.hero-center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 10;
  text-align: center;
}

.vs-badge {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 3rem;
  color: var(--bg);
  background: var(--red);
  width: 80px; height: 80px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 40px var(--red-glow), 0 0 80px rgba(232,0,61,0.15);
  letter-spacing: 0.02em;
}

/* Event info bar */
.hero-info-bar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  z-index: 20;
  display: flex;
  align-items: stretch;
  border-top: 1px solid var(--border);
  background: rgba(8,8,8,0.85);
  backdrop-filter: blur(8px);
}

.info-cell {
  flex: 1;
  padding: 1.4rem 2rem;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 0.3rem;
}

.info-cell:last-child { border-right: none; }

.info-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
}

.info-value {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.04em;
}

.info-value.highlight { color: var(--gold); }

/* Countdown display */
#heroCountdown {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.5rem;
  letter-spacing: 0.08em;
  color: var(--gold);
}

/* Poster image in hero */
.poster-wrap {
  position: absolute;
  inset: 0;
  z-index: 1;
  overflow: hidden;
}

.poster-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
  opacity: 0.18;
  filter: saturate(0.4);
}

/* ─── SECTION TITLE ───────────────────────────────────────────────────────── */
.section-header {
  display: flex;
  align-items: baseline;
  gap: 1.5rem;
  padding: 4rem 5rem 2rem;
}

.section-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 3.5rem;
  letter-spacing: 0.04em;
}

.section-sub {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
}

/* ─── FIGHT CARDS GRID ────────────────────────────────────────────────────── */
.fight-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
  gap: 1px;
  background: var(--border);
  margin: 0 5rem 6rem;
  border: 1px solid var(--border);
}

.fight-card {
  background: var(--surface);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  cursor: pointer;
  transition: background 0.25s;
}

.fight-card:hover { background: var(--surface2); }

.fight-card:hover .card-accent-line {
  width: 100%;
}

.card-accent-line {
  height: 2px;
  width: 0;
  background: var(--red);
  transition: width 0.4s ease;
  position: absolute;
  top: 0; left: 0;
}

.card-poster {
  height: 200px;
  overflow: hidden;
  position: relative;
}

.card-poster img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top;
  transition: transform 0.5s ease;
  filter: brightness(0.85);
}

.fight-card:hover .card-poster img {
  transform: scale(1.04);
}

.card-poster-fallback {
  height: 200px;
  background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%);
  display: flex;
  align-items: center;
  justify-content: center;
}

.card-poster-fallback .sport-icon {
  font-size: 3rem;
  opacity: 0.15;
}

.card-body {
  padding: 1.5rem 1.8rem;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
}

.card-sport-tag {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--red);
}

.card-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.5rem;
  font-weight: 900;
  line-height: 1.1;
  color: var(--text);
  letter-spacing: 0.02em;
}

.card-meta {
  display: flex;
  flex-direction: column;
  gap: 0.25rem;
  margin-top: auto;
  padding-top: 1rem;
  border-top: 1px solid var(--border);
}

.card-meta-row {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.85rem;
  color: var(--muted);
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 600;
  letter-spacing: 0.04em;
}

.card-meta-row svg {
  flex-shrink: 0;
  opacity: 0.5;
}

.card-countdown {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.3rem;
  color: var(--gold);
  letter-spacing: 0.06em;
}

.card-broadcaster {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  background: rgba(255,255,255,0.06);
  padding: 0.25rem 0.7rem;
  border-radius: 3px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--text);
  text-transform: uppercase;
  margin-top: 0.4rem;
  align-self: flex-start;
}

/* ─── STATUS PILL ─────────────────────────────────────────────────────────── */
.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.2rem 0.8rem;
  border-radius: 2px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

.pill-live {
  background: var(--red);
  color: white;
}

.pill-live::before {
  content: '';
  width: 5px; height: 5px;
  border-radius: 50%;
  background: white;
  animation: pulse-dot 1s infinite;
}

.pill-soon { background: var(--gold); color: #111; }
.pill-upcoming { background: rgba(255,255,255,0.1); color: var(--muted); }

/* ─── SECTION DIVIDER ─────────────────────────────────────────────────────── */
.divider {
  display: flex;
  align-items: center;
  gap: 1.5rem;
  padding: 1rem 5rem;
  margin-bottom: 1rem;
}

.divider-line {
  flex: 1;
  height: 1px;
  background: var(--border);
}

.divider-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--muted);
}

/* ─── NAV CARDS ───────────────────────────────────────────────────────────── */
.nav-cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  margin: 0 5rem;
  background: var(--border);
  border: 1px solid var(--border);
}

.nav-card {
  background: var(--surface);
  padding: 3rem;
  text-decoration: none;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  min-height: 220px;
  position: relative;
  overflow: hidden;
  transition: background 0.25s;
}

.nav-card:hover { background: var(--surface2); }

.nav-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  opacity: 0;
  transition: opacity 0.4s;
}

.nav-card:hover::before { opacity: 0.06; }

.nav-card-ufc::before {
  background-image: url('UFC-bg.jpg');
}

.nav-card-boxing::before {
  background-image: url('https://images.unsplash.com/photo-1552072092-7f9b8d63efcb?auto=format&fit=crop&q=80&w=1200');
}

.nav-card-content {
  position: relative;
  z-index: 1;
}

.nav-card-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.6rem;
}

.nav-card-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 3.5rem;
  letter-spacing: 0.04em;
  color: var(--text);
  line-height: 1;
}

.nav-card-arrow {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2rem;
  color: var(--red);
  position: relative;
  z-index: 1;
  transition: transform 0.25s;
}

.nav-card:hover .nav-card-arrow {
  transform: translate(4px, -4px);
}

/* ─── FOOTER ──────────────────────────────────────────────────────────────── */
footer {
  margin-top: 6rem;
  padding: 2.5rem 5rem;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.footer-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.4rem;
  letter-spacing: 0.08em;
  color: var(--muted);
}

.footer-logo span { color: var(--red); }

.footer-copy {
  font-size: 0.8rem;
  color: var(--muted);
  letter-spacing: 0.05em;
}

/* ─── LOADING ─────────────────────────────────────────────────────────────── */
.loading-state {
  padding: 5rem;
  text-align: center;
  color: var(--muted);
}

.spinner {
  width: 32px; height: 32px;
  border: 2px solid rgba(232,0,61,0.2);
  border-top-color: var(--red);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 0 auto 1rem;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ─── ERROR STATE ─────────────────────────────────────────────────────────── */
.error-notice {
  background: rgba(232,0,61,0.07);
  border: 1px solid rgba(232,0,61,0.2);
  border-radius: 4px;
  padding: 0.8rem 1.2rem;
  font-size: 0.85rem;
  color: #ff6b6b;
  margin: 1rem 5rem;
  font-family: 'Barlow Condensed', sans-serif;
  letter-spacing: 0.04em;
}

/* ─── RESPONSIVE ──────────────────────────────────────────────────────────── */
@media (max-width: 900px) {
  header { padding: 1.2rem 1.5rem; }
  nav { gap: 1.5rem; }

  .hero { grid-template-columns: 1fr; min-height: auto; }
  .hero::after { display: none; }
  .hero-left, .hero-right { padding: 3rem 2rem 2rem; text-align: center; align-items: center; }
  .hero-right { padding-top: 0; border-top: 1px solid var(--border); }
  .hero-right .fight-label { justify-content: center; }
  .hero-center { position: static; transform: none; padding: 1.5rem 0; }
  .hero-info-bar { position: static; flex-wrap: wrap; }
  .info-cell { min-width: 50%; border-bottom: 1px solid var(--border); }

  .section-header, .divider, footer { padding-left: 1.5rem; padding-right: 1.5rem; }
  .fight-grid, .nav-cards { margin: 0 1.5rem 4rem; }
  .nav-cards { grid-template-columns: 1fr; }
  .error-notice { margin: 1rem 1.5rem; }
  .fighter-name { font-size: clamp(3rem, 12vw, 5rem); }
}

/* ─── ENTRANCE ANIMATIONS ─────────────────────────────────────────────────── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

.hero-left  { animation: fadeUp 0.7s ease both; }
.hero-right { animation: fadeUp 0.7s 0.15s ease both; }
.hero-info-bar { animation: fadeUp 0.7s 0.3s ease both; }

.fight-card {
  animation: fadeUp 0.5s ease both;
}
</style>
</head>
<body>

<!-- ─── HEADER ─────────────────────────────────────────────────────────────── -->
<header>
  <div class="logo">Fight<span>Times</span></div>
  <nav>
    <a href="ufc.html">UFC</a>
    <a href="boxing.html">Boxing</a>
  </nav>
</header>

<!-- ─── HERO (populated by JS) ────────────────────────────────────────────── -->
<section class="hero" id="heroSection">
  <div class="hero-bg"></div>

  <!-- Poster bg -->
  <div class="poster-wrap" id="heroPosterWrap" style="display:none">
    <img id="heroPosterImg" src="" alt="">
  </div>

  <div class="hero-left">
    <div class="fight-label">
      <span class="dot"></span>
      <span id="heroSportLabel">Next Fight</span>
    </div>
    <div class="fighter-name" id="heroFighter1">—</div>
    <div class="fighter-record" id="heroEvent" style="margin-top:1rem;color:var(--muted);font-size:1rem;">Loading...</div>
  </div>

  <div class="hero-center">
    <div class="vs-badge">VS</div>
  </div>

  <div class="hero-right">
    <div class="fight-label">
      <span class="dot"></span>
      <span id="heroSportLabel2">Upcoming</span>
    </div>
    <div class="fighter-name" id="heroFighter2">—</div>
    <div class="fighter-record" id="heroStatus" style="margin-top:1rem;">—</div>
  </div>

  <div class="hero-info-bar">
    <div class="info-cell">
      <div class="info-label">Event</div>
      <div class="info-value" id="heroEventName">—</div>
    </div>
    <div class="info-cell">
      <div class="info-label">Date</div>
      <div class="info-value" id="heroDate">—</div>
    </div>
    <div class="info-cell">
      <div class="info-label">Location</div>
      <div class="info-value" id="heroLocation">—</div>
    </div>
    <div class="info-cell">
      <div class="info-label">Countdown</div>
      <div id="heroCountdown">—</div>
    </div>
  </div>
</section>

<!-- ─── ERRORS ─────────────────────────────────────────────────────────────── -->
<div id="errorContainer"></div>

<!-- ─── UPCOMING FIGHTS GRID ───────────────────────────────────────────────── -->
<div class="section-header">
  <h2 class="section-title">Upcoming Events</h2>
  <span class="section-sub">Next 30 days</span>
</div>

<div class="fight-grid" id="fightGrid">
  <div class="loading-state" style="grid-column:1/-1">
    <div class="spinner"></div>
    Loading events...
  </div>
</div>

<!-- ─── DIVIDER ─────────────────────────────────────────────────────────────── -->
<div class="divider">
  <div class="divider-line"></div>
  <div class="divider-label">Browse by sport</div>
  <div class="divider-line"></div>
</div>

<!-- ─── NAV CARDS ─────────────────────────────────────────────────────────── -->
<div class="nav-cards">
  <a href="ufc.html" class="nav-card nav-card-ufc">
    <div class="nav-card-content">
      <div class="nav-card-label">Full schedule</div>
      <div class="nav-card-title">UFC</div>
    </div>
    <div class="nav-card-arrow">↗</div>
  </a>
  <a href="boxing.html" class="nav-card nav-card-boxing">
    <div class="nav-card-content">
      <div class="nav-card-label">Full schedule</div>
      <div class="nav-card-title">Boxing</div>
    </div>
    <div class="nav-card-arrow">↗</div>
  </a>
</div>

<footer>
  <div class="footer-logo">Fight<span>Times</span></div>
  <div class="footer-copy">© 2026 Fight Times • Powered by Cloudflare Pages</div>
</footer>

<script>
// ─── UTILITIES ────────────────────────────────────────────────────────────────
function showError(msg) {
  const c = document.getElementById('errorContainer');
  const d = document.createElement('div');
  d.className = 'error-notice';
  d.textContent = '⚠ ' + msg;
  c.appendChild(d);
}

function getCountdown(dateStr) {
  const diff = new Date(dateStr) - new Date();
  if (diff <= 0) return 'LIVE NOW';
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  if (d > 0) return `${d}D ${h}H ${m}M`;
  return `${h}H ${m}M ${s}S`;
}

function getStatusPill(dateStr) {
  const diff = new Date(dateStr) - new Date();
  if (diff <= 0 && diff > -86400000) return `<span class="status-pill pill-live">● LIVE</span>`;
  if (diff < 86400000) return `<span class="status-pill pill-soon">TOMORROW</span>`;
  return `<span class="status-pill pill-upcoming">UPCOMING</span>`;
}

function formatDate(dateStr) {
  return new Date(dateStr).toLocaleDateString('en-GB', {
    weekday: 'short', day: 'numeric', month: 'short', year: 'numeric'
  });
}

function formatTime(dateStr) {
  return new Date(dateStr).toLocaleTimeString('en-GB', {
    hour: '2-digit', minute: '2-digit', timeZoneName: 'short'
  });
}

// Parse "Fighter A vs. Fighter B" into two parts
function parseFighters(title) {
  const m = title.match(/^(.+?)\s+vs\.?\s+(.+)$/i);
  if (m) return [m[1].trim(), m[2].trim()];
  return [title, ''];
}

function getBroadcasterHTML(event) {
  if (!event.broadcast || !event.broadcast.length) return '';
  const b = event.broadcast[0];
  const broadcasters = b.broadcasters || [];
  if (!broadcasters.length) return '';
  return `<span class="card-broadcaster">📺 ${broadcasters.join(', ')}</span>`;
}

// ─── FETCH ────────────────────────────────────────────────────────────────────
async function fetchAllFights() {
  const res = await fetch('/api/fights');
  if (!res.ok) throw new Error(`API ${res.status}: ${res.statusText}`);
  return await res.json();
}

// ─── NORMALIZE DATA ───────────────────────────────────────────────────────────
function normalizeBoxing(data) {
  const raw = Array.isArray(data.boxing) ? data.boxing
    : Array.isArray(data.boxing?.data) ? data.boxing.data
    : Array.isArray(data.boxing?.fights) ? data.boxing.fights
    : [];

  return raw.map(f => ({
    type: 'Boxing',
    title: f.title || 'TBA vs TBA',
    date: f.date || f.fight_date || f.event_date || '',
    location: f.location || '',
    venue: f.venue || '',
    posterUrl: f.poster_image_url || null,
    broadcast: f.broadcast || [],
    promotion: f.promotion || '',
  })).filter(f => f.date);
}

function normalizeUFC(data) {
  // The MMA API returns individual fights, not events.
  // Group by tournament name + startTimestamp to deduplicate
  const raw = Array.isArray(data.ufc) ? data.ufc : [];

  const eventMap = {};
  raw.forEach(fight => {
    const key = fight.tournament?.name || 'UFC Event';
    if (!eventMap[key]) {
      // Use the tournament startTimestamp as the event date
      const ts = fight.tournament?.startTimestamp;
      eventMap[key] = {
        type: 'UFC',
        title: fight.tournament?.name || 'UFC Event',
        date: ts ? new Date(ts * 1000).toISOString() : '',
        location: fight.tournament?.location || fight.venue?.city?.name || '',
        venue: fight.venue?.name || '',
        posterUrl: null,
        broadcast: [],
        promotion: 'UFC',
      };
    }
  });

  return Object.values(eventMap).filter(e => e.date);
}

// ─── HERO ─────────────────────────────────────────────────────────────────────
let countdownInterval = null;

function populateHero(event) {
  const [f1, f2] = parseFighters(event.title);
  document.getElementById('heroFighter1').textContent = f1 || '—';
  document.getElementById('heroFighter2').textContent = f2 || f1;
  document.getElementById('heroEvent').textContent = event.type + ' • ' + (event.promotion || event.type);
  document.getElementById('heroSportLabel').textContent = event.type;
  document.getElementById('heroSportLabel2').textContent = event.type;
  document.getElementById('heroEventName').textContent = event.title;
  document.getElementById('heroDate').textContent = formatDate(event.date);
  document.getElementById('heroLocation').textContent = event.location || event.venue || '—';

  const diff = new Date(event.date) - new Date();
  if (diff <= 0 && diff > -86400000) {
    document.getElementById('heroStatus').innerHTML = '<span class="status-pill pill-live">● LIVE NOW</span>';
  } else {
    document.getElementById('heroStatus').innerHTML = '<span class="status-pill pill-upcoming">UPCOMING</span>';
  }

  // Countdown ticker
  const el = document.getElementById('heroCountdown');
  if (countdownInterval) clearInterval(countdownInterval);
  const update = () => { el.textContent = getCountdown(event.date); };
  update();
  countdownInterval = setInterval(update, 1000);

  // Poster bg
  if (event.posterUrl) {
    document.getElementById('heroPosterImg').src = event.posterUrl;
    document.getElementById('heroPosterWrap').style.display = '';
  }
}

// ─── FIGHT CARDS ─────────────────────────────────────────────────────────────
function buildCard(event, index) {
  const [f1, f2] = parseFighters(event.title);
  const card = document.createElement('div');
  card.className = 'fight-card';
  card.style.animationDelay = `${index * 0.08}s`;

  const posterHTML = event.posterUrl
    ? `<div class="card-poster"><img src="${event.posterUrl}" alt="${event.title}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'card-poster-fallback\\'><span class=\\'sport-icon\\'>🥊</span></div>'"></div>`
    : `<div class="card-poster-fallback"><span class="sport-icon">${event.type === 'UFC' ? '🥋' : '🥊'}</span></div>`;

  const broadcasterHTML = getBroadcasterHTML(event);

  card.innerHTML = `
    <div class="card-accent-line"></div>
    ${posterHTML}
    <div class="card-body">
      <div class="card-sport-tag">${event.type}${event.promotion ? ' • ' + event.promotion : ''}</div>
      <div class="card-title">${f1}${f2 ? '<br><span style="color:var(--muted);font-size:0.85em">vs</span> ' + f2 : ''}</div>
      ${broadcasterHTML}
      <div class="card-meta">
        <div class="card-meta-row">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
          ${formatDate(event.date)} · ${formatTime(event.date)}
        </div>
        ${event.venue || event.location ? `<div class="card-meta-row">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
          ${[event.venue, event.location].filter(Boolean).join(', ')}
        </div>` : ''}
        <div class="card-countdown" id="cd-${index}">—</div>
        ${getStatusPill(event.date)}
      </div>
    </div>`;

  // Per-card countdown
  const cdEl = card.querySelector(`#cd-${index}`);
  setInterval(() => { cdEl.textContent = getCountdown(event.date); }, 1000);
  cdEl.textContent = getCountdown(event.date);

  return card;
}

// ─── MAIN ─────────────────────────────────────────────────────────────────────
async function init() {
  const grid = document.getElementById('fightGrid');

  try {
    const data = await fetchAllFights();

    const boxingEvents = normalizeBoxing(data);
    const ufcEvents    = normalizeUFC(data);

    // Merge and sort by date ascending, filter to upcoming only (within 45 days)
    const now = new Date();
    const cutoff = new Date(now.getTime() + 45 * 86400000);

    const allEvents = [...boxingEvents, ...ufcEvents]
      .filter(e => {
        const d = new Date(e.date);
        return d >= new Date(now.getTime() - 86400000) && d <= cutoff;
      })
      .sort((a, b) => new Date(a.date) - new Date(b.date));

    if (!allEvents.length) {
      grid.innerHTML = '<div class="loading-state">No upcoming events found in the next 45 days.</div>';
      return;
    }

    // Hero = soonest event
    populateHero(allEvents[0]);

    // Build grid
    grid.innerHTML = '';
    allEvents.forEach((event, i) => grid.appendChild(buildCard(event, i)));

  } catch (err) {
    console.error(err);
    showError(err.message);
    grid.innerHTML = '<div class="loading-state" style="color:#ff6b6b">Failed to load events. Check the console for details.</div>';
    // Still try to show hero placeholder
    document.getElementById('heroFighter1').textContent = 'FIGHT';
    document.getElementById('heroFighter2').textContent = 'TIMES';
    document.getElementById('heroEvent').textContent = 'UFC & Boxing Schedules';
    document.getElementById('heroEventName').textContent = '—';
  }
}

init();
</script>
