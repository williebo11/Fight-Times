<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Event – Fight Times</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #080808;
  --surface:  #101010;
  --surface2: #181818;
  --red:      #e8003d;
  --red-dim:  rgba(232,0,61,0.15);
  --gold:     #f5c518;
  --text:     #f0f0f0;
  --muted:    #666;
  --border:   rgba(255,255,255,0.06);
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  font-family: 'Barlow', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; overflow-x: hidden;
}
body::before {
  content:''; position:fixed; inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events:none; z-index:9999; opacity:.5;
}

/* HEADER */
header {
  display:flex; align-items:center; justify-content:space-between;
  padding:1.4rem 3rem; border-bottom:1px solid var(--border);
  position:sticky; top:0; background:rgba(8,8,8,0.94);
  backdrop-filter:blur(14px); z-index:100;
}
.logo { font-family:'Bebas Neue',sans-serif; font-size:1.9rem; letter-spacing:0.1em; color:var(--text); text-decoration:none; }
.logo span { color:var(--red); }
nav { display:flex; gap:2.5rem; align-items:center; }
nav a {
  font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:0.85rem;
  letter-spacing:0.18em; text-transform:uppercase;
  color:var(--muted); text-decoration:none; transition:color .2s;
}
nav a:hover { color:var(--text); }

/* BACK LINK */
.back-link {
  display:inline-flex; align-items:center; gap:.5rem;
  font-family:'Barlow Condensed',sans-serif;
  font-size:0.78rem; font-weight:700; letter-spacing:0.2em; text-transform:uppercase;
  color:var(--muted); text-decoration:none;
  padding:1.5rem 3rem .5rem; transition:color .2s;
}
.back-link:hover { color:var(--text); }
.back-link::before { content:'←'; font-size:1rem; }

/* EVENT HERO */
.event-hero { max-width:1400px; margin:0 auto; padding:.5rem 3rem 3rem; position:relative; }

.event-hero-inner {
  background:var(--surface); border:1px solid var(--border);
  overflow:hidden; padding:3.5rem 4rem;
  animation: fadeUp .5s ease both; position:relative;
}
.event-hero-inner::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  background: linear-gradient(90deg, var(--red), var(--gold), transparent);
}
.event-hero-inner::after {
  content: attr(data-name);
  position:absolute; bottom:-2rem; right:2rem;
  font-family:'Bebas Neue',sans-serif; font-size:11rem; line-height:1;
  color:rgba(255,255,255,0.018); pointer-events:none; user-select:none; white-space:nowrap;
}

/* SPORT TAG */
.event-sport-tag {
  font-family:'Barlow Condensed',sans-serif; font-size:0.72rem; font-weight:800;
  letter-spacing:0.22em; text-transform:uppercase; padding:.35rem .85rem; border-radius:3px;
  display:inline-flex; align-items:center; gap:.5rem; margin-bottom:1.8rem;
}
.event-sport-tag::before { content:''; width:6px; height:6px; border-radius:50%; }
.sport-ufc { background:linear-gradient(135deg,rgba(232,0,61,.18),rgba(232,0,61,.05)); color:var(--red); border:1px solid rgba(232,0,61,.4); }
.sport-ufc::before { background:var(--red); box-shadow:0 0 8px var(--red); }
.sport-boxing { background:linear-gradient(135deg,rgba(245,197,24,.18),rgba(245,197,24,.05)); color:var(--gold); border:1px solid rgba(245,197,24,.35); }
.sport-boxing::before { background:var(--gold); box-shadow:0 0 8px var(--gold); }

/* HERO TITLE (main event fighters) */
.event-title {
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(3rem,7vw,7.5rem);
  line-height:.9; letter-spacing:0.02em; color:var(--text); margin-bottom:2.5rem;
}
.event-title .vs-sep {
  color:var(--red); font-size:.45em;
  vertical-align:middle; margin:0 .3em;
  display:inline-block; transform:translateY(-4px);
}

.event-meta-grid {
  display:flex; flex-wrap:wrap; gap:.5rem 3rem;
  padding-top:1.8rem; border-top:1px solid var(--border);
}
.event-meta-item { display:flex; flex-direction:column; gap:.2rem; }
.event-meta-label {
  font-family:'Barlow Condensed',sans-serif; font-size:0.65rem; font-weight:700;
  letter-spacing:0.22em; text-transform:uppercase; color:var(--muted);
}
.event-meta-value {
  font-family:'Barlow Condensed',sans-serif; font-size:1.4rem; font-weight:700;
  color:var(--text); letter-spacing:0.04em;
}
.countdown-display {
  font-family:'Bebas Neue',sans-serif; font-size:2rem; color:var(--gold); letter-spacing:0.06em;
}
@keyframes blink { 0%,100% { opacity:1; } 50% { opacity:.4; } }

/* ─── CARD SECTION ─── */
.card-section { max-width:1400px; margin:0 auto; padding:0 3rem 6rem; }

.card-section-header {
  display:flex; align-items:baseline; justify-content:space-between;
  padding-bottom:1rem; border-bottom:1px solid var(--border); margin-bottom:.5rem;
}
.card-section-title {
  font-family:'Bebas Neue',sans-serif; font-size:2.4rem; letter-spacing:0.06em;
}
.card-section-count {
  font-family:'Barlow Condensed',sans-serif; font-size:0.75rem; font-weight:700;
  letter-spacing:0.2em; text-transform:uppercase; color:var(--muted);
}

/* SEGMENT LABELS (Main Card / Prelims / etc) */
.segment-label {
  font-family:'Barlow Condensed',sans-serif; font-size:0.7rem; font-weight:800;
  letter-spacing:0.28em; text-transform:uppercase; color:var(--muted);
  padding:.8rem 0 .6rem;
  display:flex; align-items:center; gap:1rem;
  position:sticky; top:65px; background:var(--bg); z-index:5;
}
.segment-label::after { content:''; flex:1; height:1px; background:var(--border); }

/* BOUT ROW */
.bout-row {
  display:grid;
  grid-template-columns: 130px 1fr auto 1fr 90px;
  align-items:center; gap:1rem;
  padding:1.5rem 1.2rem;
  border-bottom:1px solid var(--border);
  position:relative;
  transition:background .2s;
  animation: fadeUp .4s ease both;
}
.bout-row:hover { background:var(--surface); }

/* Left accent bar by bout type */
.bout-row::before {
  content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
}
.bout-main   > .bout-row::before,
.bout-row.is-main::before   { background:linear-gradient(180deg,var(--red),#a8002b); }
.bout-row.is-co::before     { background:rgba(232,0,61,.4); }
.bout-row.is-prelim::before { background:rgba(255,255,255,.08); }
.bout-row.is-early::before  { background:rgba(255,255,255,.04); }

/* BADGE */
.bout-badge-wrap { display:flex; flex-direction:column; gap:.4rem; align-items:flex-start; }
.bout-badge {
  font-family:'Barlow Condensed',sans-serif; font-size:0.62rem; font-weight:800;
  letter-spacing:0.2em; text-transform:uppercase;
  padding:.3rem .65rem; border-radius:2px; white-space:nowrap; display:inline-block;
}
.badge-main   { background:var(--red); color:#fff; }
.badge-co     { background:rgba(232,0,61,.15); color:var(--red); border:1px solid rgba(232,0,61,.3); }
.badge-prelim { background:rgba(255,255,255,.05); color:var(--muted); border:1px solid var(--border); }
.badge-early  { background:rgba(255,255,255,.03); color:var(--muted); border:1px solid var(--border); opacity:.7; }

.bout-weight {
  font-family:'Barlow Condensed',sans-serif; font-size:0.68rem; font-weight:700;
  letter-spacing:0.1em; text-transform:uppercase; color:var(--muted);
  margin-top:.1rem; display:block;
}
.bout-rounds {
  font-family:'Barlow Condensed',sans-serif; font-size:0.65rem;
  color:var(--muted); letter-spacing:.06em;
}

/* FIGHTER BLOCKS */
.fighter-block { display:flex; flex-direction:column; gap:.25rem; }
.fighter-block.right { text-align:right; align-items:flex-end; }

.fighter-name {
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(1.5rem, 2.3vw, 2.2rem);
  letter-spacing:0.03em; line-height:1; color:var(--text);
}

.fighter-record {
  font-family:'Barlow Condensed',sans-serif; font-size:0.88rem; font-weight:700;
  letter-spacing:0.06em; color:var(--muted);
}
.fighter-record .w { color:#4ade80; }
.fighter-record .l { color:#f87171; }
.fighter-record .d { color:var(--gold); }

/* VS COLUMN */
.bout-vs-col {
  display:flex; flex-direction:column; align-items:center; gap:.3rem; flex-shrink:0;
}
.vs-badge {
  font-family:'Bebas Neue',sans-serif; font-size:1.2rem; color:var(--red);
  background:var(--red-dim); padding:.2rem .7rem; border-radius:2px; letter-spacing:0.06em;
}

/* NO CARD MESSAGE */
.no-card-note {
  padding:3rem 1.2rem;
  font-family:'Barlow Condensed',sans-serif; font-size:1rem;
  letter-spacing:.08em; color:var(--muted);
  border-bottom:1px solid var(--border);
}

/* STATE */
.state-box {
  padding:5rem 3rem; text-align:center; color:var(--muted);
  font-family:'Barlow Condensed',sans-serif; font-size:1.1rem; letter-spacing:.06em;
}
.spinner {
  width:28px; height:28px; border:2px solid rgba(232,0,61,.2);
  border-top-color:var(--red); border-radius:50%;
  animation:spin .7s linear infinite; margin:0 auto 1rem;
}
@keyframes spin { to { transform:rotate(360deg); } }
@keyframes fadeUp {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}

/* FOOTER */
footer {
  padding:2rem 3rem; display:flex; align-items:center; justify-content:space-between;
  border-top:1px solid var(--border);
}
.footer-logo { font-family:'Bebas Neue',sans-serif; font-size:1.3rem; letter-spacing:.08em; color:var(--muted); }
.footer-logo span { color:var(--red); }
.footer-copy { font-size:.78rem; color:var(--muted); letter-spacing:.05em; }

/* RESPONSIVE */
@media (max-width:900px) {
  header { padding:1.2rem 1.5rem; }
  .back-link { padding:1rem 1.5rem .5rem; }
  .event-hero { padding:.5rem 1.5rem 2rem; }
  .event-hero-inner { padding:2rem 1.8rem; }
  .card-section { padding:0 1.5rem 4rem; }
  .bout-row {
    grid-template-columns: 1fr;
    gap:.6rem; padding:1.2rem 1.2rem 1.2rem 1.5rem;
  }
  .fighter-block.right { text-align:left; align-items:flex-start; }
  .bout-vs-col { flex-direction:row; align-items:center; gap:.6rem; }
}
</style>
</head>
<body>

<header>
  <a href="/" class="logo">Fight<span>Times</span></a>
  <nav>
    <a href="ufc.html">UFC</a>
    <a href="boxing.html">Boxing</a>
  </nav>
</header>

<a href="/" class="back-link">Back to schedule</a>

<div id="pageContent">
  <div class="state-box"><div class="spinner"></div>Loading event...</div>
</div>

<footer>
  <div class="footer-logo">Fight<span>Times</span></div>
  <div class="footer-copy">© 2026 Fight Times • Powered by Cloudflare Pages</div>
</footer>

<script>
// ─────────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────────
function formatTime(dateStr) {
  return new Date(dateStr).toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
}
function formatTimeZone(dateStr) {
  return new Date(dateStr).toLocaleTimeString('en-GB', { timeZoneName:'short' }).split(' ').pop();
}
function formatFullDate(dateStr) {
  return new Date(dateStr).toLocaleDateString('en-GB', {
    weekday:'long', day:'numeric', month:'long', year:'numeric'
  });
}
function getCountdown(dateStr) {
  const diff = new Date(dateStr) - Date.now();
  if (diff <= 0) return { str:'● LIVE NOW', live:true };
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  return { str: d > 0 ? `${d}D ${h}H ${m}M` : `${h}H ${m}M ${s}S`, live:false };
}
function parseFighters(title) {
  if (!title) return [null, null];
  const clean = title.replace(/^[^:]+:\s*/, '').trim();
  const m = clean.match(/^(.+?)\s+vs\.?\s+(.+)$/i);
  return m ? [m[1].trim(), m[2].trim()] : [clean, null];
}
function parseRecord(rec) {
  // expects "W-L" or "W-L-D"
  const parts = (rec || '').split('-');
  return { w: parts[0]||'?', l: parts[1]||'?', d: parts[2]||null };
}
function recordHTML(rec) {
  const { w, l, d } = parseRecord(rec);
  return `<span class="w">${w}</span>-<span class="l">${l}</span>${d ? `-<span class="d">${d}</span>` : ''}`;
}

// ─────────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────────
function renderEvent(event) {
  document.title = `${event.event} – Fight Times`;

  const [f1, f2] = parseFighters(event.main_event || '');
  const isUFC = event.promotion === 'UFC' || (event.type === 'UFC');
  const sportClass = isUFC ? 'sport-ufc' : 'sport-boxing';
  const sportLabel = event.promotion || (isUFC ? 'UFC' : 'Boxing');
  const time = formatTime(event.date);
  const tz = formatTimeZone(event.date);
  const fullDate = formatFullDate(event.date);
  const loc = [event.venue, event.location].filter(Boolean).join(' · ');

  const card = event.card || [];

  // Group bouts by segment
  const segments = [
    { key:'main',   label:'Main Card',    badgeClass:'badge-main',   rowClass:'is-main'   },
    { key:'co',     label:'Main Card',    badgeClass:'badge-co',     rowClass:'is-co'     },
    { key:'prelim', label:'Prelims',      badgeClass:'badge-prelim', rowClass:'is-prelim' },
    { key:'early',  label:'Early Prelims',badgeClass:'badge-early',  rowClass:'is-early'  },
  ];

  // Build grouped output
  function buildCard() {
    if (!card.length) {
      return `<div class="no-card-note">Full fight card not yet announced. Check back closer to the event.</div>`;
    }

    let html = '';
    const segmentOrder = ['main','co','prelim','early'];
    const segLabels = { main:'Main Card', co:'Main Card', prelim:'Prelims', early:'Early Prelims' };
    const badgeLabels = { main:'Main Event', co:'Co-Main Event', prelim:'Prelim', early:'Early Prelim' };
    const badgeClasses = { main:'badge-main', co:'badge-co', prelim:'badge-prelim', early:'badge-early' };
    const rowClasses = { main:'is-main', co:'is-co', prelim:'is-prelim', early:'is-early' };

    let lastSeg = null;
    let animDelay = 0;

    card.forEach((bout, i) => {
      const seg = bout.bout || 'prelim';
      const segLabel = segLabels[seg] || 'Card';

      // Print segment divider when segment changes
      if (seg !== lastSeg) {
        // Don't repeat "Main Card" for co-main (same segment label)
        const showDivider = !(seg === 'co' && lastSeg === 'main');
        if (showDivider) {
          html += `<div class="segment-label">${segLabel}</div>`;
        }
        lastSeg = seg;
      }

      const bLabel = badgeLabels[seg] || 'Bout';
      const bClass = badgeClasses[seg] || 'badge-prelim';
      const rClass = rowClasses[seg] || 'is-prelim';
      const rounds = bout.rounds ? `${bout.rounds} Rounds` : '';
      const delay = `animation-delay:${animDelay * 0.06}s`;
      animDelay++;

      html += `
        <div class="bout-row ${rClass}" style="${delay}">
          <div class="bout-badge-wrap">
            <span class="bout-badge ${bClass}">${bLabel}</span>
            <span class="bout-weight">${bout.weight || ''}</span>
            <span class="bout-rounds">${rounds}</span>
          </div>

          <div class="fighter-block">
            <div class="fighter-name">${bout.f1 || '—'}</div>
            <div class="fighter-record">${bout.f1_record ? recordHTML(bout.f1_record) : ''}</div>
          </div>

          <div class="bout-vs-col">
            <div class="vs-badge">VS</div>
          </div>

          <div class="fighter-block right">
            <div class="fighter-name">${bout.f2 || '—'}</div>
            <div class="fighter-record">${bout.f2_record ? recordHTML(bout.f2_record) : ''}</div>
          </div>

          <div></div>
        </div>
      `;
    });

    return html;
  }

  const html = `
    <div class="event-hero">
      <div class="event-hero-inner" data-name="${(event.event || '').replace(/^[^:]+:\s*/,'').split(':')[0]}">
        <span class="event-sport-tag ${sportClass}">${sportLabel}</span>
        <div class="event-title">
          ${f1 || event.event}${f2 ? `<span class="vs-sep">VS</span>${f2}` : ''}
        </div>
        <div class="event-meta-grid">
          <div class="event-meta-item">
            <span class="event-meta-label">Event</span>
            <span class="event-meta-value" style="font-size:1rem">${event.event}</span>
          </div>
          <div class="event-meta-item">
            <span class="event-meta-label">Date</span>
            <span class="event-meta-value" style="font-size:1.1rem">${fullDate}</span>
          </div>
          <div class="event-meta-item">
            <span class="event-meta-label">Time</span>
            <span class="event-meta-value">${time} ${tz}</span>
          </div>
          <div class="event-meta-item">
            <span class="event-meta-label">Venue</span>
            <span class="event-meta-value" style="font-size:1rem">${loc}</span>
          </div>
          <div class="event-meta-item">
            <span class="event-meta-label">Broadcast</span>
            <span class="event-meta-value" style="font-size:1rem">${event.broadcast || '—'}</span>
          </div>
          <div class="event-meta-item">
            <span class="event-meta-label">Countdown</span>
            <span class="event-meta-value countdown-display" id="heroCountdown">—</span>
          </div>
        </div>
      </div>
    </div>

    <div class="card-section">
      <div class="card-section-header">
        <div class="card-section-title">Fight Card</div>
        <div class="card-section-count">${card.length} bout${card.length !== 1 ? 's' : ''} announced</div>
      </div>
      ${buildCard()}
    </div>
  `;

  document.getElementById('pageContent').innerHTML = html;

  // Countdown ticker
  function tick() {
    const el = document.getElementById('heroCountdown');
    if (!el) return;
    const { str, live } = getCountdown(event.date);
    el.textContent = str;
    if (live) el.style.color = 'var(--red)';
  }
  tick();
  setInterval(tick, 1000);
}

// ─────────────────────────────────────────────────────────────
// INIT — read id from URL, fetch fights, find event
// ─────────────────────────────────────────────────────────────
async function init() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');

  if (!id) {
    document.getElementById('pageContent').innerHTML =
      `<div class="state-box">No event specified. <a href="/" style="color:var(--red)">Go back home</a></div>`;
    return;
  }

  try {
    const res = await fetch('/api/fights');
    if (!res.ok) throw new Error(`API ${res.status}`);
    const data = await res.json();

    const all = [...(data.ufc || []), ...(data.boxing || [])];
    const event = all.find(e => e.id === id);

    if (!event) {
      document.getElementById('pageContent').innerHTML =
        `<div class="state-box">Event not found. <a href="/" style="color:var(--red)">Go back home</a></div>`;
      return;
    }

    renderEvent(event);
  } catch (err) {
    console.error(err);
    document.getElementById('pageContent').innerHTML =
      `<div class="state-box">Failed to load event: ${err.message}</div>`;
  }
}

init();
</script>
</body>
</html>
