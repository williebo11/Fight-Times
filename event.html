<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fight Event</title>

<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0c0c0c;
  --card:#161616;
  --accent:#e10600;
  --muted:#a5a5a5;
  --border:#2a2a2a;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  background:var(--bg);
  color:white;
  font-family:'Barlow Condensed',sans-serif;
}

nav{
  display:flex;
  gap:2.5rem;
  padding:1.5rem 2rem;
}

nav a{
  text-decoration:none;
  text-transform:uppercase;
  letter-spacing:.15em;
  font-weight:600;
  color:var(--muted);
}

nav a:hover{
  color:white;
}

.hero{
  padding:3rem 2rem;
  border-bottom:1px solid var(--border);
}

.hero h1{
  font-size:3rem;
  font-weight:700;
}

.hero p{
  margin-top:1rem;
  font-size:1.2rem;
  color:var(--muted);
}

.countdown{
  margin-top:1.5rem;
  font-size:1.4rem;
  color:var(--accent);
}

.container{
  padding:2rem;
  max-width:800px;
  margin:auto;
}

.fight-card{
  background:var(--card);
  border:1px solid var(--border);
  padding:1.5rem;
  margin-bottom:1rem;
  border-radius:8px;
}

.fight-card h3{
  font-size:1.6rem;
  margin-bottom:.5rem;
}

.fight-meta{
  color:var(--muted);
  font-size:1rem;
}
.state-box{
  padding:3rem;
  text-align:center;
  color:var(--muted);
}
</style>
</head>

<body>

<nav>
  <a href="/">Home</a>
  <a href="/ufc">UFC</a>
  <a href="/boxing">Boxing</a>
</nav>

<div id="pageContent">
  <div class="state-box">Loading event...</div>
</div>

<script>
// ─────────────────────────────────────────
// COUNTDOWN
// ─────────────────────────────────────────
function startCountdown(dateString){
  const countdownEl = document.getElementById("countdown");
  const eventDate = new Date(dateString);

  function update(){
    const now = new Date();
    const diff = eventDate - now;

    if(diff <= 0){
      countdownEl.innerText = "Live Now";
      return;
    }

    const days = Math.floor(diff / (1000*60*60*24));
    const hours = Math.floor((diff / (1000*60*60)) % 24);
    const mins = Math.floor((diff / (1000*60)) % 60);

    countdownEl.innerText = `${days}d ${hours}h ${mins}m`;
  }

  update();
  setInterval(update,60000);
}

// ─────────────────────────────────────────
// RENDER EVENT
// ─────────────────────────────────────────
function renderEvent(event){

  let fightsHTML = "";

  event.fights.forEach(fight=>{
    fightsHTML += `
      <div class="fight-card">
        <h3>${fight.fighter1} vs ${fight.fighter2}</h3>
        <div class="fight-meta">
          ${fight.weightclass || ""}
        </div>
      </div>
    `;
  });

  const html = `
    <div class="hero">
      <h1>${event.name}</h1>
      <p>${event.location}</p>
      <p>${new Date(event.date).toLocaleString()}</p>
      <div class="countdown" id="countdown"></div>
    </div>

    <div class="container">
      ${fightsHTML}
    </div>
  `;

  document.getElementById("pageContent").innerHTML = html;

  startCountdown(event.date);
}

// ─────────────────────────────────────────
// INIT PAGE
// ─────────────────────────────────────────
async function initEventPage(){

  const params = new URLSearchParams(window.location.search);
  const eventId = params.get("id");

  if(!eventId){
    document.getElementById("pageContent").innerHTML =
      `<div class="state-box">No event specified.</div>`;
    return;
  }

  try{
    const res = await fetch("/api/fights");
    const data = await res.json();

    const allEvents = [...data.ufc, ...data.boxing];
    const event = allEvents.find(e=>e.id === eventId);

    if(!event){
      document.getElementById("pageContent").innerHTML =
        `<div class="state-box">Event not found.</div>`;
      return;
    }

    renderEvent(event);

  }catch(err){
    document.getElementById("pageContent").innerHTML =
      `<div class="state-box">Failed to load event.</div>`;
    console.error(err);
  }
}

initEventPage();

</script>
</body>
</html>
