<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UFC Schedule – Fight Times</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:#0a0a0f;
      --card:#111118;
      --accent:#e63946;
      --text:#e0e0ff;
      --border:rgba(230,57,70,0.2);
    }

    body {
      margin:0;
      font-family:'Inter',sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    header {
      text-align:center;
      padding:3rem 1rem;
    }

    h1 {
      font-family:'Orbitron',sans-serif;
      font-size:3rem;
      background:linear-gradient(90deg,#e63946,#f48c96);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .back {
      color:var(--accent);
      text-decoration:none;
    }

    .container {
      max-width:1000px;
      margin:0 auto;
      padding:0 1.5rem 4rem;
    }

    .event {
      background:var(--card);
      border-radius:12px;
      padding:1.5rem;
      margin:1.2rem 0;
      border:1px solid var(--border);
      transition:0.3s;
    }

    .event:hover {
      transform:translateY(-5px);
      border-color:var(--accent);
    }

    .date {
      color:#ffdd57;
      font-weight:600;
      margin-bottom:0.5rem;
    }

    .title {
      font-size:1.4rem;
      margin-bottom:0.4rem;
    }

    .details {
      color:#aaa;
    }

    .loading, .error {
      text-align:center;
      padding:3rem 0;
      color:#aaa;
    }

    footer {
      text-align:center;
      padding:2rem;
      border-top:1px solid var(--border);
      color:#777;
    }
  </style>
</head>

<body>

<header>
  <h1>UFC Schedule</h1>
  <p><a href="index.html" class="back">← Back to Home</a></p>
</header>

<div class="container">
  <div id="ufc-events">
    <div class="loading">Loading upcoming UFC events...</div>
  </div>
</div>

<footer>
  © 2026 Fight Times • UFC data from TheSportsDB
</footer>

<script>
async function loadUFC() {
  const container = document.getElementById("ufc-events");

  try {
    const response = await fetch(
      "https://www.thesportsdb.com/api/v1/json/3/eventsnextleague.php?id=4443"
    );

    const data = await response.json();
    container.innerHTML = "";

    if (data.events && data.events.length > 0) {
      data.events.slice(0, 12).forEach(event => {

        const date = event.dateEvent
          ? new Date(event.dateEvent).toLocaleDateString()
          : "TBA";

        const location = event.strVenue
          ? `${event.strVenue}, ${event.strCountry || ""}`
          : "Location TBA";

        container.innerHTML += `
          <div class="event">
            <div class="date">${date}</div>
            <div class="title">${event.strEvent}</div>
            <div class="details">${location}</div>
          </div>
        `;
      });
    } else {
      container.innerHTML =
        '<div class="error">No upcoming events found.</div>';
    }

  } catch (error) {
    container.innerHTML =
      '<div class="error">Failed to load events. Please refresh.</div>';
  }
}

loadUFC();
</script>

</body>
</html>
